# ============================================
# SERVER CONFIGURATION
# ============================================

server.port=8080
server.servlet.context-path=/api/v1


# ============================================
# SPRING APPLICATION
# ============================================

spring.application.name=citas-medicas-api


# ============================================
# DATASOURCE - ORACLE XE
# ============================================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=app_citas
spring.datasource.password=Citas2024#
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# ============================================
# JPA / HIBERNATE
# ============================================

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=APP_CITAS


# ============================================
# JACKSON
# ============================================

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd


# ============================================
# JWT CONFIGURATION
# ============================================

app.jwt.secret=5d8f3a1b7e2c9f4a6d0e8b2c5f9a3d7e1b4c8f2a6d0e3b7c5f9a2d6e1b4c8f2
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000


# ============================================
# CORS
# ============================================

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173


# ============================================
# LOGGING
# ============================================

logging.level.com.citasmedicas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO


# ============================================
# SPRINGDOC OPENAPI / SWAGGER
# ============================================

springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

springdoc.info.title=API Gestión Citas Médicas
springdoc.info.description=Sistema de Gestión de Citas Médicas - Oracle XE 18c
springdoc.info.version=1.0.0